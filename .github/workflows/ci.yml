name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run pytest
        run: uv run pytest
